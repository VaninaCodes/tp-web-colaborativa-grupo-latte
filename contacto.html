<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link rel="stylesheet" href="assets/css/contacto_style.css" />
  </head>
  <body>
    <header>
      <div id="header-logo">
        <img src="assets/img/logo.png" alt="Logo" />
        <h1><strong>GRUPO LATTE</strong></h1>
      </div>
    </header>
    <nav>
      <ul>
        <li>
          <a href="index.html">Inicio</a>
          <a href="nosotros.html">Nosotros</a>
          <a href="servicios.html">Blog</a>
          <a href="contacto.html">Contacto</a>
        </li>
      </ul>
    </nav>
    <div class="form">
      <div class="Titulo"><h4>Contactanos</h4></div>
      <section>
        <form id="consulta" action="#" method="post">
          <div class="form-name">
            <label for="Nombre">Nombre:</label>
            <br />
            <input type="text" id="Nombre" placeholder="Nombre" />
          </div>
          <div class="form-mail">
            <label for="Email">Correo Electrónico:</label>
            <br />
            <input type="mail" id="Email" placeholder="Email" />
          </div>
          <div class="form-tel">
            <label for="Teléfono">Teléfono:</label>
            <br />
            <input type="tel" id="Teléfono" placeholder="Teléfono" />
          </div>
          <div class="form-msg">
            <label for="Mensaje">Mensaje:</label>
            <br />
            <input
              class="place-msg"
              type="text"
              id="Mensaje"
              placeholder="Mensaje"
            />
          </div>
          <br />
          <div>
            <button type="submit">Enviar</button>
          </div>
        </form>
      </section>
    </div>
    <footer>
      <h1>GRUPO LATTE</h1>
      <img src="assets/img/Logo.png" alt="logo" />
      <p>Recursos</p>
      <ul>
        <li></li>
      </ul>
      <p>Contenidos</p>
      <ul>
        <li></li>
      </ul>
    </footer>
  </body>
</html>
